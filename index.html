<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="漢字れんしゅう">
  <title>漢字れんしゅうシート作成</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 48 48" aria-hidden="true">
        <rect x="5" y="4" width="34" height="40" rx="4" fill="#43b875" stroke="#1d6f4a" stroke-width="2"></rect>
        <path d="M14 13h15M14 22h11M14 31h8" stroke="#fff" stroke-width="3" stroke-linecap="round"></path>
        <path d="M30 35 42 23l3 3-12 12-5 1z" fill="#ffca3a" stroke="#8a5a00" stroke-width="1.2"></path>
        <path d="m40 21 2-2 4 4-2 2z" fill="#e35d5b"></path>
      </svg>
      <h1>漢字れんしゅうシート作成</h1>
      <p>テストでまちがえた漢字を練習しよう！</p>
    </div>
    <div class="header-actions">
      <button type="button" class="btn-outline btn-reset" id="headerResetButton">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12a9 9 0 0 1 15.2-6.5"></path><path d="M18 3v5h-5"></path><path d="M21 12a9 9 0 0 1-15.2 6.5"></path><path d="M6 21v-5h5"></path></svg>
        リセット
      </button>
    </div>
  </header>

  <main class="app-shell">
    <section class="controls" aria-label="入力と設定">
      <div class="panel">
        <div class="panel-title">
          <div class="title-left">
            <span class="step">1</span>
            <h2>練習したい漢字・熟語を入力</h2>
          </div>
        </div>
        <p class="subtext">1行に1つずつ入力してください（最大30個まで）</p>
        <div class="entry-list" id="entryList"></div>
        <div class="add-row">
          <button type="button" class="btn-add" id="addButton">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
            追加する
          </button>
          <span class="count" id="entryCount">5 / 30</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">
          <div class="title-left">
            <span class="step">2</span>
            <h2>シートの設定</h2>
          </div>
        </div>
        <div class="settings">
          <fieldset class="setting-row">
            <legend>文字の大きさ</legend>
            <div class="segmented" id="sizeOptions">
              <label><input type="radio" name="charSize" value="small">小</label>
              <label><input type="radio" name="charSize" value="normal" checked>ふつう</label>
              <label><input type="radio" name="charSize" value="large">大</label>
            </div>
          </fieldset>

          <fieldset class="setting-row">
            <legend>お手本の文字の濃さ</legend>
            <div class="segmented" id="opacityOptions">
              <label><input type="radio" name="sampleOpacity" value="light">うすい</label>
              <label><input type="radio" name="sampleOpacity" value="normal">ふつう</label>
              <label><input type="radio" name="sampleOpacity" value="dark" checked>濃い</label>
            </div>
          </fieldset>

          <p class="note">右のプレビューから印刷できます。</p>
        </div>
      </div>
    </section>

    <section class="preview-wrap" aria-label="印刷プレビュー">
      <div class="preview-panel">
        <div class="preview-toolbar">
          <div class="title-left">
            <span class="step">3</span>
            <h2>プレビュー <span id="previewStatus">（A4 たて）</span></h2>
          </div>
          <div class="print-actions">
            <button type="button" class="btn-blue" id="printButton">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9V3h12v6"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><path d="M6 14h12v7H6z"></path></svg>
              印刷する
            </button>
          </div>
        </div>
        <div class="preview-stage" id="sheetsContainer">
        </div>
      </div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
