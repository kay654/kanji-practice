<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="漢字れんしゅう">
  <title>漢字れんしゅうシート作成</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 48 48" aria-hidden="true">
        <rect x="5" y="4" width="34" height="40" rx="4" fill="#43b875" stroke="#1d6f4a" stroke-width="2"></rect>
        <path d="M14 13h15M14 22h11M14 31h8" stroke="#fff" stroke-width="3" stroke-linecap="round"></path>
        <path d="M30 35 42 23l3 3-12 12-5 1z" fill="#ffca3a" stroke="#8a5a00" stroke-width="1.2"></path>
        <path d="m40 21 2-2 4 4-2 2z" fill="#e35d5b"></path>
      </svg>
      <h1>漢字れんしゅうシート作成</h1>
      <p>テストでまちがえた漢字を練習しよう！</p>
    </div>
    <div class="header-actions">
      <button type="button" class="btn-outline btn-reset" id="headerResetButton">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.5l9.6-9.6c1-1 2.5-1 3.5 0l5.5 5.5c1 1 1 2.5 0 3.5L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>
        リセット
      </button>
    </div>
  </header>

  <main class="app-shell">
    <section class="controls" aria-label="入力と設定">
      <div class="panel">
        <div class="panel-title">
          <div class="title-left">
            <span class="step">1</span>
            <h2>練習したい漢字・熟語を入力</h2>
          </div>
        </div>
        <p class="subtext">1行に1つずつ入力してください（最大36個まで）</p>
        <div class="entry-list" id="entryList"></div>
        <div class="add-row">
          <div class="entry-actions">
            <button type="button" class="btn-add" id="addButton">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"></path></svg>
              追加する
            </button>
            <button type="button" class="btn-choose" id="chooseIdiomsButton" aria-label="熟語からえらぶ">
              熟語からえらぶ
            </button>
          </div>
          <span class="count" id="entryCount">1 / 36</span>
        </div>
      </div>
    </section>

    <section class="preview-wrap" aria-label="印刷プレビュー">
      <div class="preview-panel">
        <div class="preview-toolbar">
          <div class="title-left">
            <span class="step">2</span>
            <h2>プレビュー <span id="previewStatus">（A4 たて）</span></h2>
          </div>
          <div class="print-actions">
            <button type="button" class="btn-blue" id="printButton">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9V3h12v6"></path><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><path d="M6 14h12v7H6z"></path></svg>
              印刷する
            </button>
          </div>
        </div>
        <div class="preview-stage" id="sheetsContainer">
        </div>
      </div>
    </section>
  </main>

  <div class="print-root" id="printRoot" aria-hidden="true"></div>

  <div class="modal-overlay" id="idiomModal" hidden>
    <div class="idiom-dialog" role="dialog" aria-modal="true" aria-labelledby="idiomDialogTitle">
      <header class="dialog-header">
        <h2 id="idiomDialogTitle">熟語からえらぶ</h2>
        <button type="button" class="dialog-close" id="closeIdiomDialogButton" aria-label="熟語からえらぶを閉じる">×</button>
      </header>

      <section class="grade-section" aria-label="何年生の熟語？">
        <p class="dialog-label">何年生の熟語？</p>
        <div class="grade-buttons" id="gradeButtons"></div>
      </section>

      <div class="dialog-separator" aria-hidden="true"></div>

      <section class="idiom-list" id="idiomList" aria-label="熟語リスト">
        <p class="idiom-message">熟語を読みこんでいます。</p>
      </section>

      <footer class="dialog-footer">
        <p class="selected-count" id="selectedCount">選んだ熟語：0こ</p>
        <div class="dialog-actions">
          <button type="button" class="btn-dialog-cancel" id="cancelIdiomButton" aria-label="キャンセル">キャンセル</button>
          <button type="button" class="btn-dialog-add" id="addSelectedIdiomsButton" aria-label="選んだ熟語を追加する" disabled>追加する</button>
        </div>
      </footer>
    </div>
  </div>

  <script src="data/graded_idioms.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
